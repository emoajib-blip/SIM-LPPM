name: 🔒 Security Audit

on:
    push:
        branches: [main]
    schedule:
        # Setiap Senin pukul 07:00 WIB (00:00 UTC)
        - cron: "0 0 * * 1"
    workflow_dispatch:

jobs:
    # ──────────────────────────────────────────────
    # JOB 1: Dependency Vulnerability Scan
    # ──────────────────────────────────────────────
    composer-audit:
        name: 🔍 Composer Dependency Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  tools: composer:v2

            - name: Install Dependencies
              run: composer install --no-interaction --prefer-dist --no-scripts

            - name: Run Composer Audit
              run: composer audit

    # ──────────────────────────────────────────────
    # JOB 2: NPM / Bun Dependency Audit
    # ──────────────────────────────────────────────
    npm-audit:
        name: 🔍 NPM Dependency Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install Dependencies
              run: bun install --frozen-lockfile

            - name: Run NPM Audit
              run: bun audit || true # non-blocking — hanya laporan

    # ──────────────────────────────────────────────
    # JOB 3: .env Leak Guard (Zero Trust)
    # ──────────────────────────────────────────────
    env-leak-guard:
        name: 🛡️ Zero Trust — .env Leak Guard
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Check for .env files in repo
              run: |
                  if git ls-files | grep -E '(^|/)\.(env)$'; then
                    echo "❌ BAHAYA: File .env ditemukan di dalam repositori!"
                    exit 1
                  else
                    echo "✅ Zero Trust: Tidak ada file .env yang bocor ke repositori."
                  fi

            - name: Verify .gitignore includes .env
              run: |
                  if grep -q "^\.env$" .gitignore; then
                    echo "✅ .gitignore sudah mengamankan .env"
                  else
                    echo "⚠️  PERINGATAN: .env tidak ada di .gitignore"
                    exit 1
                  fi

# Vetted by AI - Manual Review Required by Senior Engineer/Manager
# Architectural Alignment: TOGAF & Zero Trust Security
