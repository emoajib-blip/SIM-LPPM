name: 📦 CD — Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build Docker Image & Push to GHCR
  # ──────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # JOB 2: Deploy to VPS via SSH (aktifkan jika VPS siap)
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    # ⚠️ Hapus komentar di bawah ini jika VPS sudah dikonfigurasi
    if: false # TODO: ubah ke true dan isi secrets (VPS_HOST, VPS_USERNAME, VPS_SSH_KEY)
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/sim-lppm-itsnu
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan optimize
            docker image prune -f
            echo "✅ Deployment selesai: ${{ github.sha }}"

# Vetted by AI - Manual Review Required by Senior Engineer/Manager
